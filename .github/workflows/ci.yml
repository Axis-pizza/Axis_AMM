name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-and-typescript:
    name: Rust + TypeScript Checks
    uses: ./.github/workflows/reusable-rust-and-typescript.yml

  local-e2e:
    name: Local Validator E2E
    needs: rust-and-typescript
    uses: ./.github/workflows/reusable-e2e-local.yml
