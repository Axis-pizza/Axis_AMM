name: A/B Test Suite

on:
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/litesvm-jupiter-cpi.yml'
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/litesvm-jupiter-cpi.yml'

concurrency:
  group: ab-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ab-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/axis-g3m/target
            contracts/pfda-amm-3/target
            contracts/ab-integration-tests/target
          key: ab-${{ hashFiles('contracts/ab-integration-tests/Cargo.lock', 'contracts/axis-g3m/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # ── TypeScript checks ──
      - name: TypeScript type check
        run: bun run typecheck 2>&1 || true

      # ── Build SBF programs ──
      # pfda-amm is now exercised by tests/pfda_amm_coverage.rs in the
      # ab-integration-tests crate, so build its .so alongside the g3m
      # and pfda-amm-3 binaries the existing test suite loads.
      - name: Build SBF programs
        run: |
          cd contracts/axis-g3m && cargo build-sbf
          cd ../pfda-amm-3 && cargo build-sbf
          cd ../pfda-amm && cargo build-sbf
          cd ../axis-vault && cargo build-sbf

      - name: Verify committed Jupiter V6 fixture
        # Same rationale as in main-report.yml: the binary is committed
        # so CI never round-trips to mainnet RPC. Refresh via
        # scripts/ops/refresh-jupiter-fixture.sh on Jupiter V6 upgrades.
        run: |
          if [ ! -f contracts/axis-g3m/fixtures/jupiter_v6.so ]; then
            echo "::error::contracts/axis-g3m/fixtures/jupiter_v6.so missing"
            echo "Run scripts/ops/refresh-jupiter-fixture.sh and commit the result."
            exit 1
          fi
          ls -la contracts/axis-g3m/fixtures/jupiter_v6.so

      # ── LiteSVM unit tests ──
      - name: Run axis-g3m LiteSVM tests
        run: |
          cd contracts/axis-g3m
          cargo test --test jupiter_cpi -- --nocapture --skip mainnet_fork

      - name: Run A/B comparison tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison -- --nocapture --skip jupiter --skip mainnet

      # ── #33 regression gates ──
      # close_delay: CloseBatchHistory / CloseExpiredTicket success + rejection paths.
      # scenario_coverage: AddLiquidity / SwapRequest rejections (wrong-vault, paused).
      # Both run against the same pfda_amm_3.so built above — zero extra fixture cost.
      - name: Run close-delay regression tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test close_delay -- --nocapture

      - name: Run scenario-coverage regression tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test scenario_coverage -- --nocapture

      # pfda-amm (legacy 2-token) — CloseBatchHistory/CloseExpiredTicket
      # success + rejection, AddLiquidity paused/wrong-vault,
      # SwapRequest duplicate-same-batch atomicity (PR #50 reorder).
      - name: Run pfda-amm regression tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test pfda_amm_coverage -- --nocapture

      # axis-g3m — Swap slippage/zero/same-idx/paused, Rebalance cooldown +
      # wrong authority, InitializePool invalid-token-count / weights-mismatch /
      # duplicate-init.
      - name: Run axis-g3m regression tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test axis_g3m_coverage -- --nocapture

      # pfda-amm-3 Claim — slippage exceeded + zero-volume token short-circuit.
      - name: Run pfda-amm-3 Claim regression tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test pfda3_claim_coverage -- --nocapture

      # axis-vault — CreateEtf data-validation branches (basket size, weights,
      # ticker, name). All fire before any CPI so no SPL setup required.
      - name: Run axis-vault regression tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test axis_vault_coverage -- --nocapture

      # #36: DepositSol / WithdrawSol scaffolding guards. Locks down
      # the parameter-validation surface (zero amount, basket-size cap)
      # and the NotYetImplemented placeholder so the dispatcher stays
      # sane while the Jupiter CPI body is being designed.
      - name: Run axis-vault SOL-ix scaffold tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test axis_vault_sol_ix_scaffold -- --nocapture

      - name: Generate LiteSVM A/B report
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison test_ab_multi_scenario_report -- --nocapture

      # ── Mainnet fork via solana-test-validator --clone ──
      - name: Create test keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --force --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Start validator with mainnet-forked Jupiter
        # Use the locally dumped Jupiter binary (from the previous step)
        # instead of `--clone --url mainnet-beta`. Validator startup
        # cannot fail on RPC outages this way. Token program is
        # bundled into solana-test-validator by default.
        run: |
          solana-test-validator \
            --reset \
            --ledger /tmp/fork-ledger \
            --bpf-program 65aE9QdVz5bapV19BGt5cyTgVitYpekGwusRoQEovNUi contracts/axis-g3m/target/deploy/axis_g3m.so \
            --bpf-program DbAPmgkrpCCZrpBMv5x1ye6nJUreqY313SuQjZsMyjEf contracts/pfda-amm-3/target/deploy/pfda_amm_3.so \
            --bpf-program JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4 contracts/axis-g3m/fixtures/jupiter_v6.so \
            > /tmp/fork-validator.log 2>&1 &
          echo $! > /tmp/fork-validator.pid
          for i in $(seq 1 30); do
            solana cluster-version -u localhost 2>/dev/null && break
            sleep 1
          done
          echo "Validator ready"

      - name: Run mainnet-fork E2E (solana-test-validator)
        run: |
          RPC_URL=http://localhost:8899 bun test/e2e/axis-g3m/axis-g3m.jupiter-fork.e2e.ts

      # #33: kidney flagged RebalanceViaJupiter disc=4 as zero-coverage —
      # the existing jupiter-fork E2E uses attestation mode (disc=3)
      # because real Jupiter routes need an API quote. The
      # `test_ab_pr_validation_mainnet_fork` Rust test in
      # ab-integration-tests already fetches a real quote and drives
      # disc=4 end-to-end via run_mainnet_fork_pair — it's just
      # #[ignore]d because it needs mainnet RPC + Jupiter API. Unlock
      # it here with --ignored and a mainnet URL. continue-on-error
      # so external API flakes don't gate the repo.
      - name: Run disc=4 RebalanceViaJupiter regression test (real Jupiter route)
        env:
          MAINNET_RPC_URL: https://api.mainnet-beta.solana.com
          AB_FORK_REPEATS: "1"
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison test_ab_pr_validation_mainnet_fork \
            -- --ignored --nocapture --test-threads=1
        continue-on-error: true

      # axis-vault mainnet-fork check (#36): PR #42 shipped the
      # client-bundled SOL-in / SOL-out flow with stub tests only. This
      # step exercises the real Jupiter quote API + ALT resolution against
      # a live Jupiter program cloned into the forked validator. demo.ts
      # builds the versioned tx but does not sign/send — it's a structural
      # validator for the Jupiter path and tx size/layout.
      - name: Run axis-vault Jupiter mainnet-fork check
        run: |
          RPC_URL=http://localhost:8899 \
          JUPITER_HOST=https://quote-api.jup.ag \
            bun scripts/axis-vault/demo.ts
        continue-on-error: true  # external Jupiter API flakiness ≠ repo regression

      - name: Stop forked validator
        if: always()
        run: kill $(cat /tmp/fork-validator.pid 2>/dev/null) 2>/dev/null || true

      # ── Job Summary ──
      - name: Publish reports to Job Summary
        if: always()
        run: |
          echo "# A/B Test Reports" >> $GITHUB_STEP_SUMMARY

          if [ -f reports/ab/pr-validation/latest.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat reports/ab/pr-validation/latest.md >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f reports/ab/mainnet-fork/latest.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Mainnet-Fork Report" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -100 reports/ab/mainnet-fork/latest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f reports/ab/latest.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Multi-Scenario CU Report" >> $GITHUB_STEP_SUMMARY
            cat reports/ab/latest.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload all reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ab-reports
          path: |
            reports/ab/latest.*
            reports/ab/pr-validation/latest.*
            reports/ab/mainnet-fork/latest.*
