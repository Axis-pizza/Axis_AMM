name: Main AB Report

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/main-report.yml'

concurrency:
  group: main-ab-report-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-ab-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/axis-g3m/target
            contracts/pfda-amm-3/target
            contracts/ab-integration-tests/target
          key: ab-report-${{ hashFiles('contracts/ab-integration-tests/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        run: bun run typecheck 2>&1 || true

      - name: Build SBF programs
        run: |
          cd contracts/axis-g3m && cargo build-sbf
          cd ../pfda-amm-3 && cargo build-sbf

      - name: Dump Jupiter V6 from mainnet (with RPC fallbacks)
        # The public mainnet-beta endpoint hits transient connection
        # failures often enough to break this workflow on most pushes.
        # Try mainnet-beta first; on failure rotate through alternative
        # public RPCs that mirror Solana mainnet state. Up to 3 attempts
        # per URL.
        run: |
          mkdir -p contracts/axis-g3m/fixtures
          urls=(
            "https://api.mainnet-beta.solana.com"
            "https://solana-api.projectserum.com"
            "https://rpc.ankr.com/solana"
          )
          ok=0
          for url in "${urls[@]}"; do
            for attempt in 1 2 3; do
              echo "Attempt $attempt against $url"
              if solana program dump \
                  -u "$url" \
                  JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4 \
                  contracts/axis-g3m/fixtures/jupiter_v6.so; then
                ok=1
                break 2
              fi
              sleep $((attempt * 5))
            done
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::failed to dump Jupiter V6 from any RPC"
            exit 1
          fi
          ls -la contracts/axis-g3m/fixtures/jupiter_v6.so

      - name: Generate A/B report via LiteSVM
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison test_ab_multi_scenario_report -- --nocapture

      - name: Run LiteSVM PR validation
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison test_ab_pr_validation_litesvm -- --nocapture

      # ── Mainnet fork via solana-test-validator --clone ──
      - name: Create test keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --force --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Start validator with mainnet-forked Jupiter
        # Use the locally dumped Jupiter binary (from the previous step)
        # instead of `--clone --url mainnet-beta`, so validator startup
        # doesn't hit the network and can't fail on RPC outages.
        # Token program is bundled into solana-test-validator by default;
        # no clone needed.
        run: |
          solana-test-validator \
            --reset \
            --ledger /tmp/fork-ledger \
            --bpf-program 65aE9QdVz5bapV19BGt5cyTgVitYpekGwusRoQEovNUi contracts/axis-g3m/target/deploy/axis_g3m.so \
            --bpf-program DbAPmgkrpCCZrpBMv5x1ye6nJUreqY313SuQjZsMyjEf contracts/pfda-amm-3/target/deploy/pfda_amm_3.so \
            --bpf-program JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4 contracts/axis-g3m/fixtures/jupiter_v6.so \
            > /tmp/fork-validator.log 2>&1 &
          echo $! > /tmp/fork-validator.pid
          for i in $(seq 1 30); do
            solana cluster-version -u localhost 2>/dev/null && break
            sleep 1
          done

      - name: Run mainnet-fork E2E (solana-test-validator)
        run: |
          RPC_URL=http://localhost:8899 bun test/e2e/axis-g3m/axis-g3m.jupiter-fork.e2e.ts

      - name: Stop forked validator
        if: always()
        run: kill $(cat /tmp/fork-validator.pid 2>/dev/null) 2>/dev/null || true

      # ── Job Summary ──
      - name: Publish reports to Job Summary
        if: always()
        run: |
          echo "# Main Branch A/B Report" >> $GITHUB_STEP_SUMMARY

          if [ -f reports/ab/pr-validation/latest.md ]; then
            cat reports/ab/pr-validation/latest.md >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f reports/ab/mainnet-fork/latest.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Mainnet-Fork" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -100 reports/ab/mainnet-fork/latest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f reports/ab/latest.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat reports/ab/latest.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push report
        run: |
          if [ ! -f reports/ab/latest.md ]; then
            echo "No report generated"
            exit 0
          fi
          if git diff --quiet -- reports/ab; then
            echo "No report changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ab
          git commit -m "chore(reports): refresh A/B report via LiteSVM"
          git push
