name: Reusable Rust + TypeScript

on:
  workflow_call:

permissions:
  contents: read

jobs:
  rust-and-typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Set up Rust
        run: bash ci/setup-rust.sh

      - name: Install Solana CLI
        run: bash ci/install-solana.sh

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Run Rust + TypeScript pipeline
        run: bash ci/job-rust-and-typescript.sh
